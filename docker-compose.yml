services:
  db:
    image: postgres:16
    container_name: app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: app_api
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    depends_on:
      - db
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
